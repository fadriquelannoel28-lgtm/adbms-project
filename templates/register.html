<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/useraccount.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="parent-container">

    <div class="left-container">
        <h1>Welcome to MEDSTOCK</h1>
        <p>Manage your medicine inventory efficiently and effectively with our user-friendly dashboard. Create an account to access all features and streamline your inventory management process.</p>
    </div>
    
    <div class="right-container">
        <form action="/register" method="POST">
            <h1>REGISTER</h1>
            <hr>
            <h3>Create New Account</h3>

            <div class="name-section">
                <input type="text" id="firstname" name="firstname" placeholder="First Name" required>

                <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
            </div>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Create Account</button>
        </form>
    </div>

</div>

</body>
</html>
