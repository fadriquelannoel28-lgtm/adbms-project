<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/useraccount.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="parent-container">

    <div class="left-container">
        <h1>Welcome to MEDSTOCK</h1>
        <p>Manage your medicine inventory efficiently and effectively with our user-friendly dashboard. Create an account to access all features and streamline your inventory management process.</p>
    </div>
    
    <div class="right-container">
        <h1>REGISTER</h1>
        <hr>
        <h3>Create New Account</h3>

        <form action="/register" method="POST" enctype="multipart/form-data">

            <select name="roles" id="roles" required>
                <option value="" disabled selected>Select Role</option>
                <option value="staff">Staff</option>
                <option value="supplier">Supplier</option>
            </select>

            <div class="name-section">
                <input type="text" id="firstname" name="firstname" placeholder="First Name" required>

                <input type="text" id="middlename" name="middlename" placeholder="Midddle Name" required>

                <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
            </div>

            <div class="name-section">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="name-section">
                <input type="text" id="username" name="username" placeholder="Create Username" required>
            </div>

            <div class="name-section">
                <input type="password" id="password" name="password" placeholder="Create Password" required>
            </div>

            <div class="name-section">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>            
            </div>

            <div class="registration">
                <select name="u_gender" id="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>


            <div class="name-section">
                <label id="birthdate">Birthdate</label>

                <input type="date" id="birthdate" name="birthdate" required>
            </div>

            <div class="name-section">
                <input type="text" id="phonenumber" name="phonenumber" placeholder="Phone Number" required>
            </div>

            <div class="name-section">
                <label class="id-upload-container" for="govID">
                    <img src="{{ url_for('static', filename='images/default-image.jpg') }}"  id="id-preview" style="width: 100%; height: 150px; object-fit: cover; display: block; border: 1px solid #ccc;" alt="Government ID Preview">                    
                    <div class="upload-overlay">
                        <span>Click to upload Government ID</span>
                    </div>
                </label>

                <input type="file" id="govID" name="govID" accept="image/*" style="display: none;" required
                    onchange="if (this.files && this.files[0]) { 
                        var reader = new FileReader(); 
                        reader.onload = function(e) { 
                            document.getElementById('id-preview').src = e.target.result; 
                        }; 
                        reader.readAsDataURL(this.files[0]); 
                    }">            
</div>

            <button type="submit" style="margin-top: 15px;">Submit Information</button>

            </form>
        </div>

</div>

</body>
</html>
