<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const medInput = document.getElementById('med-input');
            const medPreview = document.getElementById('med-preview');

            medInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        medPreview.src = e.target.result;
                    }
                    reader.readAsDataURL(file);
                } else {
                    medPreview.src = "{{ url_for('static', filename='images/thumbnail-med.jpg') }}";
                }
            });
        });
    </script>
</head>
<body>
    <nav class="navigator">
        <h1>MEDSTOCK</h1>
        <ul>
            <li class="{{ 'active' if page_title == 'Dashboard' }}"><a href="{{ url_for('main.dashboard', user_id=u_id, name=u_name) }}"><i class="fas fa-home"></i>Dashboard</a></li>
            <li class="{{ 'active' if page_title == 'Inventory Management' }}"><a href="{{ url_for('inv.inventory_management', user_id=u_id, name=u_name) }}"><i class="fas fa-pills"></i>Medicine Inventory Management</a></li>
            <li class="{{ 'active' if page_title == 'Stock Monitoring' }}"><a href="{{ url_for('main.stock_monitoring', user_id=u_id, name=u_name) }}"><i class="fas fa-chart-line"></i>Stock Monitoring</a></li>
            <li class="{{ 'active' if page_title == 'Ordering System' }}"><a href="{{ url_for('main.ordering_system', user_id=u_id, name=u_name) }}"><i class="fas fa-shopping-cart"></i>Ordering System</a></li>
            <li class="{{ 'active' if page_title == 'Reports' }}"><a href="{{ url_for('main.reports', user_id=u_id, name=u_name) }}"><i class="fas fa-file-alt"></i>Reports</a></li>
            <li class="{{ 'active' if page_title == 'User Access' }}"><a href="{{ url_for('main.user_access', user_id=u_id, name=u_name) }}"><i class="fas fa-users"></i>User Access</a></li>
        </ul>
    </nav>
    <main class="content">
        <nav><h3>{{ page_title }}</h3></nav>
        {% block content %}{% endblock %}
        <span class="logo">All Rights Reserved &copy; 2023</span>
    </main>
    
</body>
</html>
